spring:
  application:
    name: bloom-filter-project
  datasource:
    url: jdbc:postgresql://localhost:5431/postgres
    username: postgres
    password: root
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
redis:
  pool:
    host: localhost
    port: 6379
    max-active: 20
    max-idle: 10
    min-idle: 5
    max-wait: 10000ms
    max-wait-millis: 10000
    max-total: 20